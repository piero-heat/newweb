<!doctype html>
<html lang="es-CL">
  <head>

    <link
      href="https://api.fontshare.com/v2/css?f[]=general-sans@400,500,600,700&display=swap"
      rel="stylesheet"
    />

    <!-- ── SEO ── -->
    <title>HEAT IA · Agentes de IA + CRM para automatizar tus ventas</title>

      content="Agentes de IA que contestan, filtran y venden en WhatsApp, Instagram y Facebook 24/7 — junto a tu equipo. Plataforma de IA + CRM para +350 negocios en LATAM y EEUU."
    />
    <link rel="canonical" href="https://heatlatam.com/" />

    <!-- ── Open Graph (WhatsApp, Facebook, LinkedIn, Instagram) ── -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="HEAT IA" />
    <meta property="og:locale" content="es_CL" />

    <meta property="og:image:height" content="630" />

    <!-- ── Twitter / X ── -->

    <meta
      name="twitter:title"
      content="HEAT IA · Agentes de IA + CRM para automatizar tus ventas"
    />
    <meta
      name="twitter:description"
      content="Agentes de IA que contestan, filtran y venden 24/7 en WhatsApp, Instagram y Facebook. IA + CRM para +350 negocios en LATAM y EEUU."
    />
    <meta name="twitter:image" content="https://heatlatam.com/og-image.png" />
    <!-- Stripe Buy Button script — habilita el web component <stripe-buy-button> -->
    <script async src="https://js.stripe.com/v3/buy-button.js"></script>

    <!-- ────────────────────────────────────────────────────────── -->
    <!-- Meta Pixel — HEAT IA (ID 893679896695698)                 -->
    <!-- Carga base + PageView inicial. Las navegaciones SPA       -->
    <!-- las dispara <MetaPixel /> (ver src/components/MetaPixel). -->
    <!-- ────────────────────────────────────────────────────────── -->
    <script>
      !(function (f, b, e, v, n, t, s) {
        if (f.fbq) return;
        n = f.fbq = function () {
          n.callMethod
            ? n.callMethod.apply(n, arguments)
            : n.queue.push(arguments);
        };
        if (!f._fbq) f._fbq = n;
        n.push = n;
        n.loaded = !0;
        n.version = "2.0";
        n.queue = [];
        t = b.createElement(e);
        t.async = !0;
        t.src = v;
        s = b.getElementsByTagName(e)[0];
        s.parentNode.insertBefore(t, s);
      })(
        window,
        document,
        "script",
        "https://connect.facebook.net/en_US/fbevents.js"
      );
      fbq("init", "893679896695698");
      fbq("track", "PageView");
    </script>
    <!-- End Meta Pixel -->
  </head>
  <body class="bg-background text-foreground antialiased">
    <!-- Meta Pixel — noscript fallback (movido a body porque Vite's parser
         no acepta <noscript> con <img/> en <head> en modo strict) -->
    <noscript><img height="1" width="1" style="display:none" src="https://www.facebook.com/tr?id=893679896695698&ev=PageView&noscript=1" /></noscript>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
